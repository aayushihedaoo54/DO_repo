default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: 5
  username: root
  password: Mysql@aH286
  host: localhost

development:
  <<: *default
  database: distributed_orchestratror_development

test:
  <<: *default
  database: distributed_orchestratror_test

production:
  primary: &primary_production
    <<: *default
    database: distributed_orchestratror_production
    username: distributed_orchestratror
    password: <%= ENV["DISTRIBUTED_ORCHESTRATROR_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: distributed_orchestratror_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: distributed_orchestratror_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: distributed_orchestratror_production_cable
    migrations_paths: db/cable_migrate
